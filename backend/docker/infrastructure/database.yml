version: '3.8'
services:
  postgres-auth:
    image: postgres:15
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME:-auth_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5431:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - app-network

  postgres-schema:
    image: postgres:15
    environment:
      POSTGRES_DB: ${SCHEMA_DB_NAME:-schema_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - schema-db-data:/var/lib/postgresql/data
    networks:
      - app-network

  postgres-query:
    image: postgres:15
    environment:
      POSTGRES_DB: ${QUERY_DB_NAME:-query_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5434:5432"
    volumes:
      - query-db-data:/var/lib/postgresql/data
    networks:
      - app-network

  postgres-quota:
    image: postgres:15
    environment:
      POSTGRES_DB: ${QUOTA_DB_NAME:-quota_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5435:5432"
    volumes:
      - quota-db-data:/var/lib/postgresql/data
    networks:
      - app-network

volumes:
  auth-db-data:
  schema-db-data:
  query-db-data:
  quota-db-data:

networks:
  app-network:
    driver: bridge

version: '3.8'
services:
  query-service:
    image: ${QUERY_SERVICE_IMAGE:-query-service:latest}
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-query:5432/${QUERY_DB_NAME:-query_db}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-password}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_QUOTA_USAGE: quota.usage
      SERVER_PORT: 8083
    depends_on:
      - postgres-query
      - kafka
    networks:
      - app-network

networks:
  app-network:
    external: true

version: '3.8'
services:
  # 모든 DB 포트 노출 (로컬 개발용)
  postgres-auth:
    ports:
      - "5431:5432"
  postgres-schema:
    ports:
      - "5432:5432"
  postgres-query:
    ports:
      - "5433:5432"
  postgres-quota:
    ports:
      - "5434:5432"

  # Kafka 포트 노출
  kafka:
    ports:
      - "9092:9092"

  # 모든 서비스 포트 노출
  auth-service:
    ports:
      - "8081:8081"
  schema-service:
    ports:
      - "8082:8082"
  query-service:
    ports:
      - "8083:8083"
  quota-service:
    ports:
      - "8084:8084"
  gateway-service:
    ports:
      - "8080:8080"
  agent-service:
    ports:
      - "8085:8085"

  # Kafka UI 추가 (로컬 개발 편의용)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka
    networks:
      - app-network

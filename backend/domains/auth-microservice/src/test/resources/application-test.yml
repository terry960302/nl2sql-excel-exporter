spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  secret-key: testSecretKey123456789012345678901234567890123456789012345678901234567890
  access-token:
    expiration-time: 7200000 # 2시간 (밀리초)
  refresh-token:
    expiration-time: 2592000000 # 30일 (밀리초)